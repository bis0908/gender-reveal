<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="Open the box">
  <defs>
    <linearGradient id="lootboxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0F2FE"/>
      <stop offset="0.5" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="lootboxLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="lootboxBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#lootboxBg)"/>
  <!-- 광채(상자에서 새어 나오는 성별 중립 빛) -->
  <circle cx="146" cy="86" r="58" fill="#FFFFFF" opacity="0.35"/>
  <!-- 상자 본체 -->
  <rect x="100" y="86" width="92" height="58" rx="6" fill="url(#lootboxBody)"/>
  <!-- 상자 뚜껑 -->
  <rect x="92" y="68" width="108" height="24" rx="6" fill="url(#lootboxLid)"/>
  <!-- 리본 세로 -->
  <rect x="139" y="68" width="14" height="76" fill="#FBBF24"/>
  <!-- 리본 매듭 -->
  <circle cx="146" cy="68" r="11" fill="#FBBF24"/>
  <circle cx="146" cy="68" r="5" fill="#F59E0B"/>
  <!-- 탭 힌트(손가락 원형 펄스) -->
  <circle cx="206" cy="118" r="20" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
  <circle cx="206" cy="118" r="9" fill="#FFFFFF" opacity="0.9"/>
  <text x="160" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#7C3AED">TAP</text>
</svg>
